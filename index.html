<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./mjlogo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./logo192.png" />
  <title>Money Junction</title>
  <link rel="stylesheet" crossorigin href="./assets/index.css">
  <style>
    #pwa-install-container {
      display: none;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin: 2rem 0;
      clear: both;
    }

    #pwa-install-btn {
      padding: 0.65rem 1.5rem;
      background-color: var(--color-mj-green, #10b981);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    #pwa-install-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    #pwa-install-btn:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <div id="pwa-install-container">
    <button id="pwa-install-btn" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" y1="15" x2="12" y2="3" />
      </svg>
      Install App
    </button>
  </div>

  <script>
    // Register Service Worker for PWA functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('SW registered');
        }).catch(err => console.log('SW failed', err));
      });
    }

    let deferredPrompt;
    const installContainer = document.getElementById('pwa-install-container');
    const installBtn = document.getElementById('pwa-install-btn');

    // Capture Install Prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installContainer.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          installContainer.style.display = 'none';
        }
        deferredPrompt = null;
      } else {
        alert("To install this app on your mobile device:\n\n1. Open your browser menu (⋮ or ⋯)\n2. Select 'Install App' or 'Add to Home Screen'\n\nOn iPhone/iPad: Tap the Share button and select 'Add to Home Screen'.");
      }
    });

    // Inject button below "Sign in"
    const injectButton = () => {
      const buttons = document.querySelectorAll('button');
      for (const btn of buttons) {
        if (btn.innerText.toLowerCase().includes('sign in')) {
          if (btn.nextSibling !== installContainer) {
            btn.after(installContainer);
            // After finding it once, we stop if already injected correctly
            if (installContainer.style.display !== 'flex' && deferredPrompt) {
              installContainer.style.display = 'flex';
            }
          }
          break;
        }
      }
    };

    // Show button to everyone initially as requested, but handle state
    installContainer.style.display = 'flex';

    const observer = new MutationObserver(injectButton);
    observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    setInterval(injectButton, 3000);
  </script>
</body>

</html>
